services:
  db:
    image: postgres
    container_name: db
    environment:
      - POSTGRES_USER=${USUARIO}
      - POSTGRES_PASSWORD=${SENHA}
      - POSTGRES_DB=${NOME_BD}
    ports:
      - "${PORTA_LOCAL}:${PORTA_DOCKER}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Garante que o app so inicie quando o Postgres estiver aceitando conexoes.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USUARIO} -d ${NOME_BD}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
    image: teste-sistema-recebiveis:latest
    container_name: app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # A aplicacao acessa o banco pela rede interna do compose (host "db").
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/${NOME_BD}
      - SPRING_DATASOURCE_USERNAME=${USUARIO}
      - SPRING_DATASOURCE_PASSWORD=${SENHA}
      # O schema e gerido por Flyway; o Hibernate apenas valida o mapeamento.
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
    ports:
      - "${APP_PORTA_LOCAL:-8080}:8080"

volumes:
  pgdata:
