spring.application.name=testesistemarecebiveis
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=ChangeThisSecretForProduction
jwt.expiration-ms=3600000
# Padroes de origem liberados para CORS (lista separada por virgula; aceita
# curingas via setAllowedOriginPatterns). O padrao cobre qualquer porta em
# localhost e 127.0.0.1 para desenvolvimento. Em producao, restrinja ao dominio
# real do front-end (ex.: https://app.seudominio.com).
app.cors.allowed-origins=http://localhost:[*],http://127.0.0.1:[*]
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# Repositorios sao JpaRepository comuns (sem @RepositoryRestResource); a integracao
# Data REST do springdoc quebra com NPE ao gerar o /v3/api-docs, entao a desativamos.
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration
# Importacao de cotacoes PTAX do Banco Central (servico Olinda).
# import-on-startup: tenta importar a moeda-padrao ao subir a aplicacao.
# tentativas: total de tentativas da chamada HTTP (1 inicial + retries).
bcb.ptax.import-on-startup=true
bcb.ptax.moeda-padrao=USD
bcb.ptax.moeda-destino=BRL
bcb.ptax.tentativas=3
bcb.ptax.backoff-ms=500
bcb.ptax.connect-timeout-ms=3000
bcb.ptax.read-timeout-ms=5000
