spring.application.name=testesistemarecebiveis
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
jwt.secret=ChangeThisSecretForProduction
jwt.expiration-ms=3600000
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
# Repositorios sao JpaRepository comuns (sem @RepositoryRestResource); a integracao
# Data REST do springdoc quebra com NPE ao gerar o /v3/api-docs, entao a desativamos.
spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration
